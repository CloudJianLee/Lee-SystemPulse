name: SystemPulse
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
targets:
  SystemPulse:
    type: application
    platform: macOS
    sources:
      - SystemPulse
    resources:
      - SystemPulse/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloudjianlee.SystemPulse
        PRODUCT_MODULE_NAME: SystemPulse
        INFOPLIST_FILE: SystemPulse/Info.plist
        PRODUCT_NAME: System Pulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - SystemPulseTests
  SystemPulseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SystemPulseTests
    dependencies:
      - target: SystemPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloudjianlee.SystemPulseTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/System Pulse.app/Contents/MacOS/System Pulse"
        BUNDLE_LOADER: "$(TEST_HOST)"
