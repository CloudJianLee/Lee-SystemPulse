name: Lee-SystemPulse
options:
  bundleIdPrefix: com.lee
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
targets:
  LeeSystemPulse:
    type: application
    platform: macOS
    sources:
      - LeeSystemPulse
    resources:
      - LeeSystemPulse/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lee.leesystempulse
        PRODUCT_MODULE_NAME: LeeSystemPulse
        INFOPLIST_FILE: LeeSystemPulse/Info.plist
        PRODUCT_NAME: Lee-SystemPulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - LeeSystemPulseTests
  LeeSystemPulseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - LeeSystemPulseTests
    dependencies:
      - target: LeeSystemPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lee.leesystempulse.LeeSystemPulseTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lee-SystemPulse.app/Contents/MacOS/Lee-SystemPulse"
        BUNDLE_LOADER: "$(TEST_HOST)"
